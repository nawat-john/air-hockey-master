name: CI

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      SDL_VIDEODRIVER: dummy        # headless pygame
      MPLBACKEND: Agg
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies (CPU torch — no GPU on runners)
        run: |
          python -m pip install --upgrade pip
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install -r requirements.txt

      - name: Run physics & predictor tests
        run: pytest tests -q

      - name: Smoke-test the training + eval pipeline
        run: |
          python scripts/train_sac.py --phase defend --timesteps 2000 --n-envs 2 --out runs/_ci.zip
          python scripts/evaluate.py --model runs/_ci.zip --episodes 5 --opponent scripted
